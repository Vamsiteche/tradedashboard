<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Algo Trading Terminal</title>
    <style>
        :root {
            --bg-color: #0d1117; --card-bg: #161b22; --text-main: #c9d1d9;
            --text-muted: #8b949e; --profit: #2ea043; --loss: #f85149;
            --border: #30363d; --primary: #58a6ff;
        }
        
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 16px; -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* LOGIN STYLES */
        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .login-box { background-color: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 350px; text-align: center; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-google { background-color: white; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .btn-google:hover { background-color: #f1f1f1; }
        .btn-primary { background-color: var(--primary); color: white; margin-top: 10px; }
        .btn-primary:hover { background-color: #4a8ee6; }
        
        .login-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 6px; background: #0d1117; border: 1px solid var(--border); color: white; font-size: 14px; }
        .login-input:focus { outline: none; border-color: var(--primary); }
        
        .divider { display: flex; align-items: center; text-align: center; margin: 15px 0; color: var(--text-muted); font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        #loginError { color: var(--loss); font-size: 13px; margin-top: 15px; display: none; background: rgba(248, 81, 73, 0.1); padding: 8px; border-radius: 5px; border: 1px solid rgba(248, 81, 73, 0.4); }

        /* HEADER & STATUS */
        #dashboardScreen { display: none; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .app-title { font-size: 20px; font-weight: 700; margin: 0; color: white;}
        
        .connection-pill { display: flex; align-items: center; gap: 6px; background: var(--card-bg); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; font-weight: 600; cursor: pointer; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.green { background-color: var(--profit); box-shadow: 0 0 8px var(--profit); }
        .dot.red { background-color: var(--loss); box-shadow: 0 0 8px var(--loss); }
        .dot.yellow { background-color: #d29922; box-shadow: 0 0 8px #d29922; }

        /* SUMMARY CARDS */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .stat-card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
        .stat-card.full-width { grid-column: span 2; padding: 24px; }
        
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600;}
        .pnl-value { font-size: 36px; font-weight: 800; margin: 0; }
        .sub-value { font-size: 20px; font-weight: 700; color: white; }
        .positive { color: var(--profit); } .negative { color: var(--loss); } .neutral { color: var(--text-main); }

        /* SECTIONS */
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-top: 30px;}
        .section-title { font-size: 16px; font-weight: 600; color: white; margin: 0;}
        .count-badge { background: #21262d; color: var(--text-muted); padding: 2px 8px; border-radius: 10px; font-size: 12px; }

        /* TRADE CARDS */
        .trade-card { background-color: var(--card-bg); border-radius: 8px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .trade-card.long { border-left: 4px solid var(--profit); } .trade-card.short { border-left: 4px solid var(--loss); }
        
        .t-left { display: flex; flex-direction: column; gap: 4px; }
        .t-right { text-align: right; display: flex; flex-direction: column; gap: 4px; }
        
        .t-symbol { font-size: 16px; font-weight: 700; color: white; }
        .t-side { font-size: 10px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; background: #21262d; color: var(--text-muted); }
        .t-detail { font-size: 12px; color: var(--text-muted); }
        
        .t-pnl { font-size: 15px; font-weight: 700; }
        .t-reason { font-size: 11px; color: var(--text-muted); }

        .empty-state { text-align: center; padding: 24px; color: var(--text-muted); background-color: var(--card-bg); border-radius: 8px; border: 1px dashed var(--border); font-size: 13px; }
        .footer-note { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 30px; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen">
        <div class="login-box">
            <h2 style="margin-top: 0; color: white; margin-bottom: 25px;">Terminal Access</h2>
            
            <button class="btn btn-google" onclick="loginWithGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="G" style="width: 18px;">
                Sign in with Google
            </button>
            
            <div class="divider">OR USE EMAIL</div>

            <input type="email" id="emailInput" class="login-input" placeholder="Admin Email">
            <input type="password" id="passwordInput" class="login-input" placeholder="Password">
            
            <button class="btn btn-primary" onclick="loginWithEmail()">Secure Login</button>
            
            <div id="loginError">Unauthorized Access.</div>
        </div>
    </div>

    <div id="dashboardScreen">
        
        <div class="top-bar">
            <h1 class="app-title">Algo Terminal</h1>
            <div class="connection-pill" id="connPill" onclick="logout()">
                <div class="dot red" id="connDot"></div>
                <span id="connText">OFFLINE</span>
            </div>
        </div>

        <div class="summary-grid">
            <div class="stat-card full-width">
                <div class="stat-label">Net Daily PnL</div>
                <div id="dailyPnl" class="pnl-value neutral">₹0.00</div>
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 8px;" id="botModeText">Waiting for bot sync...</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Total Trades</div>
                <div class="sub-value" id="tradesCount">0</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Market Status</div>
                <div class="sub-value" id="marketStatus" style="font-size: 14px; margin-top: 4px;">CLOSED</div>
            </div>
        </div>

        <div class="section-header">
            <h2 class="section-title">Open Positions</h2>
            <span class="count-badge" id="activeCount">0</span>
        </div>
        <div id="activeContainer">
            <div class="empty-state">No open positions right now.</div>
        </div>

        <div class="section-header">
            <h2 class="section-title">Today's History</h2>
            <span class="count-badge" id="historyCount">0</span>
        </div>
        <div id="historyContainer">
            <div class="empty-state">No closed trades today.</div>
        </div>
        
        <div id="lastUpdated" class="footer-note">Awaiting python synchronization...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // ==========================================
    // 1. ADD YOUR CONFIG & EMAIL HERE
    // ==========================================
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBCutkIsHV41yg4G4fCb6QEDEIQHTbETj0",
  authDomain: "algotrade-5da97.firebaseapp.com",
  databaseURL: "https://algotrade-5da97-default-rtdb.firebaseio.com",
  projectId: "algotrade-5da97",
  storageBucket: "algotrade-5da97.firebasestorage.app",
  messagingSenderId: "799962877805",
  appId: "1:799962877805:web:b6a413cd613f9b12355464",
  measurementId: "G-Z9W8PN6QZD"
};
   

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const googleProvider = new firebase.auth.GoogleAuthProvider();
    let dbListener = null;
    let connListener = null;

    // --- LOGIN LOGIC ---

    // Option 1: Google Redirect
    function loginWithGoogle() {
        const errDiv = document.getElementById('loginError');
        errDiv.style.display = 'none';
        
        auth.signInWithRedirect(googleProvider).catch(error => { 
            errDiv.innerText = "Redirect Error: " + error.message; 
            errDiv.style.display = 'block';
        });
    }

    // Catch errors returning from Google Redirect (Crucial for Mobile)
    auth.getRedirectResult().catch(error => {
        if (error) {
            const errDiv = document.getElementById('loginError');
            errDiv.innerText = "Google Sign-In Failed: " + error.message; 
            errDiv.style.display = 'block';
        }
    });

    // Option 2: Email & Password
    function loginWithEmail() {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passwordInput').value;
        const errDiv = document.getElementById('loginError');
        errDiv.style.display = 'none';
        
        if(!email || !pass) {
            errDiv.innerText = "Please enter both email and password.";
            errDiv.style.display = 'block';
            return;
        }

        auth.signInWithEmailAndPassword(email, pass).catch(error => { 
            errDiv.innerText = "Invalid credentials or unauthorized.";
            errDiv.style.display = 'block';
        });
    }

    // Logout
    function logout() { 
        if(confirm("Are you sure you want to log out of the terminal?")) {
            auth.signOut(); 
        }
    }

    // --- AUTHENTICATION STATE WATCHER ---
    auth.onAuthStateChanged(user => {
        if (user) {
            // Success! Load Dashboard
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';
            startListeners();
        } else {
            // Logged out
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboardScreen').style.display = 'none';
            if (dbListener) db.ref('dashboard').off('value', dbListener);
            if (connListener) db.ref('.info/connected').off('value', connListener);
        }
    });

    // --- MARKET STATUS CLOCK ---
    function updateMarketStatus() {
        const now = new Date();
        const hours = now.getHours();
        const mins = now.getMinutes();
        const timeVal = hours + (mins/60);
        const statusEl = document.getElementById('marketStatus');
        
        if (now.getDay() === 0 || now.getDay() === 6) {
            statusEl.innerText = "WEEKEND"; statusEl.style.color = "var(--text-muted)";
        } else if (timeVal >= 8.75 && timeVal < 9.25) {
            statusEl.innerText = "BACKTESTING"; statusEl.style.color = "#d29922";
        } else if (timeVal >= 9.25 && timeVal < 15.00) {
            statusEl.innerText = "LIVE (OPEN)"; statusEl.style.color = "var(--profit)";
        } else {
            statusEl.innerText = "CLOSED"; statusEl.style.color = "var(--text-muted)";
        }
    }
    setInterval(updateMarketStatus, 60000); 
    updateMarketStatus();

    // --- REAL-TIME DATABASE LISTENERS ---
    function startListeners() {
        // 1. Connection Health Listener
        connListener = db.ref('.info/connected').on('value', function(snap) {
            const dot = document.getElementById('connDot');
            const txt = document.getElementById('connText');
            if (snap.val() === true) {
                dot.className = "dot green"; txt.innerText = "CONNECTED";
            } else {
                dot.className = "dot red"; txt.innerText = "OFFLINE";
            }
        });

        // 2. Main Dashboard Data Listener
        dbListener = db.ref('dashboard').on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (!data) {
                document.getElementById('botModeText').innerText = "Database is empty. Waiting for Python script...";
                return;
            }

            // Update Top Summary
            if (data.summary) {
                const pnl = parseFloat(data.summary.daily_pnl);
                const pnlEl = document.getElementById('dailyPnl');
                pnlEl.innerText = `₹${pnl.toFixed(2)}`;
                pnlEl.className = `pnl-value ${pnl > 0 ? 'positive' : pnl < 0 ? 'negative' : 'neutral'}`;
                
                document.getElementById('tradesCount').innerText = data.summary.trades_executed;
                document.getElementById('botModeText').innerText = `Running in ${data.summary.mode}`;
                document.getElementById('lastUpdated').innerText = `Last python sync: ${data.summary.last_updated} IST`;
            }

            // Update Open Positions
            const aContainer = document.getElementById('activeContainer');
            const activePos = data.active_positions || {};
            const aSymbols = Object.keys(activePos);
            document.getElementById('activeCount').innerText = aSymbols.length;

            if (aSymbols.length === 0) {
                aContainer.innerHTML = '<div class="empty-state">No open positions right now.</div>';
            } else {
                aContainer.innerHTML = '';
                aSymbols.forEach(symbol => {
                    const pos = activePos[symbol];
                    const cleanSymbol = symbol.replace('.NS', ''); 
                    aContainer.innerHTML += `
                        <div class="trade-card ${pos.side}">
                            <div class="t-left">
                                <div class="t-symbol">${cleanSymbol} <span class="t-side">${pos.side}</span></div>
                                <div class="t-detail">Entry: ₹${pos.entry_price.toFixed(2)} | Qty: ${pos.qty}</div>
                            </div>
                            <div class="t-right">
                                <div class="t-detail" style="color:var(--profit); font-weight:600;">TP: ₹${pos.tp.toFixed(2)}</div>
                                <div class="t-detail" style="color:var(--loss); font-weight:600;">SL: ₹${pos.sl.toFixed(2)}</div>
                            </div>
                        </div>
                    `;
                });
            }

            // Update Closed History (Reversing loop to show newest on top)
            const hContainer = document.getElementById('historyContainer');
            const history = data.history || [];
            document.getElementById('historyCount').innerText = history.length;

            if (history.length === 0) {
                hContainer.innerHTML = '<div class="empty-state">No closed trades today.</div>';
            } else {
                hContainer.innerHTML = '';
                for (let i = history.length - 1; i >= 0; i--) {
                    const trade = history[i];
                    const pnlClass = trade.pnl >= 0 ? 'positive' : 'negative';
                    const sign = trade.pnl >= 0 ? '+' : '';
                    hContainer.innerHTML += `
                        <div class="trade-card">
                            <div class="t-left">
                                <div class="t-symbol">${trade.symbol.replace('.NS', '')} <span class="t-side">${trade.side}</span></div>
                                <div class="t-reason">${trade.time} • ${trade.reason}</div>
                            </div>
                            <div class="t-right">
                                <div class="t-pnl ${pnlClass}">${sign}₹${trade.pnl.toFixed(2)}</div>
                            </div>
                        </div>
                    `;
                }
            }
        });
    }
</script>
</body>
</html>
